<style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#131022;color:#e9e6f5;font-family:system-ui,-apple-system,sans-serif}a{color:#ffcc57}</style>
<style>
  .center :is(.title,.lead),[style*="text-align:center"] :is(.title,.lead){margin-inline:auto!important}
</style>
<style>/* AOS self-contained — no external file needed */
[data-aos^=fade]{opacity:0;transition-property:opacity,transform}
[data-aos^=fade].aos-animate{opacity:1;transform:translateZ(0)}
[data-aos=fade]{transform:none}
[data-aos=fade-up]{transform:translate3d(0,100px,0)}
[data-aos=fade-down]{transform:translate3d(0,-100px,0)}
[data-aos=fade-left]{transform:translate3d(100px,0,0)}
[data-aos=fade-right]{transform:translate3d(-100px,0,0)}
[data-aos^=zoom]{opacity:0;transition-property:opacity,transform}
[data-aos^=zoom].aos-animate{opacity:1;transform:translateZ(0) scale(1)}
[data-aos=zoom-in]{transform:scale(.6)}
[data-aos=zoom-out]{transform:scale(1.2)}
[data-aos]{transition-duration:.6s;transition-timing-function:cubic-bezier(.25,.46,.45,.94)}
[data-aos][data-aos-duration="400"]{transition-duration:.4s}[data-aos][data-aos-duration="600"]{transition-duration:.6s}[data-aos][data-aos-duration="800"]{transition-duration:.8s}[data-aos][data-aos-duration="1000"]{transition-duration:1s}[data-aos][data-aos-duration="1200"]{transition-duration:1.2s}[data-aos][data-aos-duration="1500"]{transition-duration:1.5s}
@media (prefers-reduced-motion:reduce){[data-aos]{opacity:1!important;transform:none!important;transition:none!important}}
</style>
</head>
<body>
<p>Taking you to your dashboard… <a href="dashboard.html">Continue &rarr;</a></p>

<!--aos-init-->
<noscript><style>[data-aos]{opacity:1!important;transform:none!important}</style></noscript>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
(function(){var rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function start(){if(rm)return;
if(typeof AOS!=='undefined'&&AOS.init){try{AOS.init({duration:1200,once:true,offset:60,easing:'ease-out-cubic'});return;}catch(e){}}
var els=[].slice.call(document.querySelectorAll('[data-aos]'));if(!els.length)return;
if(!('IntersectionObserver'in window)){els.forEach(function(e){e.classList.add('aos-animate');});return;}
var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('aos-animate');io.unobserve(en.target);}});},{threshold:0,rootMargin:'0px 0px -48px 0px'});
els.forEach(function(e){io.observe(e);});}
if(document.readyState!=='loading')start();else window.addEventListener('DOMContentLoaded',start);})();
</script>
</body>
